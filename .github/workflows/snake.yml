name: Generate Snake

on:
  # Ular akan update otomatis setiap jam 12 malam
  schedule:
    - cron: "0 0 * * *" 
  
  # Biar bisa kita jalankan paksa (manual) sekarang
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Generate Snake
        uses: Platane/snk@v3
        with:
          # Ganti dengan username GitHub kamu
          github_user_name: Adityamp2008
          # Ini lokasi output gambarnya nanti
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Push to Output Branch
        uses: crazy-max/gh-action-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
