name: Generate Dark Pacman

on:
  # Update otomatis tiap jam 12 malam
  schedule:
    - cron: "0 0 * * *" 
  
  # Tombol manual
  workflow_dispatch:

permissions: 
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Generate Snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: Adityamp2008
          # --- BAGIAN INI KUNCINYA ---
          # Kita setting manual warnanya biar jadi Dark Mode + Pacman Kuning
          outputs: |
            dist/pacman-dark.svg?color_snake=#FFD700&color_dots=#161b22,#0e4429,#006d32,#26a641,#39d353&bg_color=#0d1117
          # ---------------------------

      - name: Push to Output Branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: output
          publish_dir: dist
          keep_history: true
