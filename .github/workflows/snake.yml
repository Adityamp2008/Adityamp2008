name: Generate Snake

on:
  # Jalan otomatis tiap jam 12 malam
  schedule:
    - cron: "0 0 * * *" 
  
  # Tombol manual
  workflow_dispatch:

# --- INI KUNCI RAHASIANYA ---
# Kita paksa izin tulis langsung di sini
permissions: 
  contents: write
# -----------------------------

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Generate Snake
        uses: Platane/snk@v3
        with:
          # Username kamu
          github_user_name: Adityamp2008
          # Output gambar
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Push to Output Branch
        uses: crazy-max/gh-action-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
